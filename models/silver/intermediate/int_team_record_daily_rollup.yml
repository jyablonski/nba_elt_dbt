version: 2

models:
  - name: int_team_record_daily_rollup
    description: Running team win/loss record by game date.
    data_tests:
      - dbt_expectations.expect_compound_columns_to_be_unique:
          arguments:
            column_list: ["team", "game_date"]
    columns:
      - name: team
        data_tests:
          - not_null
      - name: game_date
        data_tests:
          - not_null
      - name: running_total_games_played
        data_tests:
          - not_null
