version: 2

models:
  - name: int_twitter_comments
    description: Normalized Twitter comments/tweets prepared for sentiment aggregation.
    data_tests:
      - dbt_expectations.expect_compound_columns_to_be_unique:
          arguments:
            column_list: ["username", "tweet", "created_at"]
    columns:
      - name: tweet
        data_tests:
          - not_null
