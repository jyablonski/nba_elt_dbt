version: 2

models:
  - name: int_team_mvp_production_summary
    description: |
      Team-level sum of injury-adjusted avg_mvp_score from contract value analysis.
      Denominator for each player's pct_of_team_production.
    data_tests:
      - dbt_expectations.expect_table_row_count_to_equal:
          arguments:
            value: 30
    columns:
      - name: team
        data_tests:
          - not_null
          - unique
      - name: team_total_mvp_score
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: true
      - name: roster_count
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
                inclusive: true
