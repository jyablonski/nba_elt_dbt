version: 2

models:
  - name: int_team_payroll_summary
    description: |
      Team-level payroll rollups with salary-cap and luxury-tax threshold context
      for roster construction charts.
    data_tests:
      - dbt_expectations.expect_table_row_count_to_equal:
          arguments:
            value: 30
    columns:
      - name: team
        data_tests:
          - not_null
          - unique
      - name: season
        data_tests:
          - not_null
      - name: total_payroll
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: true
      - name: salary_cap
        data_tests:
          - not_null
      - name: luxury_tax_threshold
        data_tests:
          - not_null
      - name: first_apron
        data_tests:
          - not_null
      - name: second_apron
        data_tests:
          - not_null
      - name: pct_of_cap
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: true
      - name: is_above_cap
        data_tests:
          - not_null
      - name: is_above_luxury_tax
        data_tests:
          - not_null
      - name: is_above_first_apron
        data_tests:
          - not_null
      - name: is_above_second_apron
        data_tests:
          - not_null
