version: 2

models:
  - name: fact_opp_stats_data
    description: Team opponent shooting and defensive statistics from the latest source snapshot.
    data_tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          arguments:
            min_value: 0
            max_value: 30
    columns:
      - name: team
        data_tests:
          - not_null
          - unique
