version: 2

models:
  - name: preseason_odds
    description: Prod Preseason Odds Table
    data_tests:
      - dbt_expectations.expect_table_row_count_to_equal:
          arguments:
            value: 30
    columns:
      - name: team
        data_tests:
          - unique
          - not_null
      - name: __created_at
        description: Timestamp when this gold model was produced by dbt.
