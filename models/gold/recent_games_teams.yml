version: 2

models:
  - name: recent_games_teams
    description: Prod Recent Games for Teams Table
    data_tests:
      - dbt_expectations.expect_compound_columns_to_be_unique:
          arguments:
            column_list: ["team", "game_date"]
      - dbt_expectations.expect_table_row_count_to_be_between:
          arguments:
            min_value: 0
            max_value: 15
      - dbt_utils.expression_is_true:
          arguments:
            expression: >
              (series_round is null and series_status is null and series_game_number is null)
              or (
                series_round in ('First Round', 'Conf. Semifinals', 'Conf. Finals', 'NBA Finals')
                and series_status is not null
                and series_game_number between 1 and 7
              )
          name: recent_games_teams_series_fields_are_consistent
    columns:
      - name: pts_color
        data_tests:
          - dbt_expectations.expect_column_values_to_be_in_set:
              arguments:
                value_set: [0, 1, 2, 3]
      - name: opp_pts_color
        data_tests:
          - dbt_expectations.expect_column_values_to_be_in_set:
              arguments:
                value_set: [0, 1, 2, 3]
      - name: game_date
        description: Should only be 1 day of data
        data_tests:
          - dbt_expectations.expect_column_distinct_count_to_be_less_than:
              arguments:
                value: 2
      - name: max_team_lead
        description: Max lead should be less than 60pts and not negative
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 60
      - name: max_opponent_lead
        description: Max lead should be less than 60pts and not negative
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 60
      - name: series_round
        description: Playoff round label for the game, null outside the playoffs.
      - name: series_status
        description: Playoff series state after the game, null outside the playoffs.
      - name: series_game_number
        description: Game number within the playoff series, null outside the playoffs.
      - name: __created_at
        description: Timestamp when this gold model was produced by dbt.
