version: 2

models:
  - name: ingestion_freshness
    description: |
      Daily ops mart: current snapshot of enabled ingestion flags that write to bronze.
      Rebuilt each run. Post_hook writes idempotent rows to `ingestion_freshness_history`
      (one successful snapshot per flag/day; retries can replace null/zero placeholders).

      Excludes config-only flags (`reddit`, `season`, `playoffs`) and disabled flags.
    columns:
      - name: flag
        description: Feature flag name from `gold.feature_flags.flag`.
        data_tests:
          - not_null
          - unique
      - name: bronze_source_table
        description: Bronze table written by nba_elt_ingestion for this flag.
        data_tests:
          - not_null
      - name: write_method
        description: "`upsert` or `append` as used in ingestion."
        data_tests:
          - not_null
      - name: check_date
        description: Pacific calendar date used for the freshness check.
        data_tests:
          - not_null
      - name: records_today
        description: Row count in the bronze table with activity on `check_date`.
      - name: freshness_status
        description: "`fresh` or `stale`."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["fresh", "stale"]
      - name: is_fresh
        description: Whether bronze had activity on `check_date`.
        data_tests:
          - not_null

  - name: ingestion_freshness_history
    description: |
      Audit log populated by post_hook on `ingestion_freshness`. At most one row per
      `flag` + `check_date` with `records_today > 0`; stale/null rows may be replaced on retry.
    columns:
      - name: history_inserted_at
        description: Timestamp when this snapshot was appended to history.
