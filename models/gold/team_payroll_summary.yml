version: 2

models:
  - name: team_payroll_summary
    description: |
      Team-level payroll totals with salary-cap and luxury-tax thresholds for
      org-level roster construction context on the Team Analysis page.
    data_tests:
      - dbt_expectations.expect_table_row_count_to_equal:
          arguments:
            value: 30
    columns:
      - name: team
        data_tests:
          - not_null
          - unique
      - name: season
        data_tests:
          - not_null
      - name: total_payroll
        data_tests:
          - not_null
      - name: salary_cap
        data_tests:
          - not_null
      - name: luxury_tax_threshold
        data_tests:
          - not_null
      - name: first_apron
        data_tests:
          - not_null
      - name: second_apron
        data_tests:
          - not_null
      - name: __created_at
        description: Timestamp when this gold model was produced by dbt.
