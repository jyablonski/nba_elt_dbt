# Name your project! Project names should contain only lowercase characters
# and underscores. A good package name should reflect your organization's
# name or the intended use of these models
name: "nba_elt_project"
version: "1.0.0"
config-version: 2

vars:
  "dbt_date:time_zone": "America/Los_Angeles"
  "prediction_start_date": "2025-10-01"

  # Cap-economics constant for pay-vs-production roster analysis.
  dollar_per_win_share: 3400000
  default_player_salary: 1017781

  # dbt_project_evaluator: align package heuristics with this project's
  # bronze/silver/gold layout instead of the default staging/marts layout.
  model_types: ["intermediate", "marts", "ml", "gold", "scratch", "other"]
  intermediate_folder_name: "intermediate"
  marts_folder_name: ["dim", "fact"]
  ml_folder_name: "ml"
  gold_folder_name: "gold"
  scratch_folder_name: ["scratch", "ad_hoc_analytics", "operations"]
  other_folder_name: "other"

  intermediate_prefixes: ["int_"]
  marts_prefixes: ["dim_", "fact_"]
  ml_prefixes: ["ml_"]
  gold_prefixes:
    [
      "bans_",
      "contract_",
      "future_",
      "game_",
      "ingestion_",
      "injuries_",
      "injury_",
      "most_",
      "mov_",
      "nba_",
      "odds_",
      "opp_",
      "past_",
      "pbp_",
      "pipeline_",
      "player_",
      "preseason_",
      "recent_",
      "reddit_",
      "rolling_",
      "schedule_",
      "shooting_",
      "social_",
      "standings_",
      "team_",
      "transactions_",
      "twitter_",
      "user_",
    ]
  scratch_prefixes: ["bet_", "blown_", "daily_", "three_"]
  other_prefixes: ["rpt_"]
  primary_key_test_macros:
    [
      ["dbt.test_unique", "dbt.test_not_null"],
      ["dbt_utils.test_unique_combination_of_columns"],
      ["dbt_expectations.test_expect_compound_columns_to_be_unique"],
    ]

# This setting configures which "profile" dbt uses for this project.
profile: "default"

# These configurations specify where dbt should look for different types of files.
# The `source-paths` config, for example, states that models in this project can be
# found in the "models/" directory. You probably won't need to change these!
model-paths: ["models"]
analysis-paths: ["analysis"]
test-paths: ["tests"]
seed-paths: ["data"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target" # directory which will store compiled SQL files
clean-targets: # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"

# Configuring models
# Full documentation: https://docs.getdbt.com/docs/configuring-models

# In this example config, we tell dbt to build all models in the example/ directory
# as tables. These settings can be overridden in the individual model files
# using the `{{ config(...) }}` macro.
models:
  nba_elt_project:
    # Gold layer - final marts for consumption
    gold:
      +materialized: table
      +schema: gold
      +tags:
        - "GOLD"
        - "MARTS"
        - "DAILY"

    # Silver layer - cleaned and joined data (all subfolders use same config)
    silver:
      +materialized: table
      +schema: silver
      +tags:
        - "SILVER"
        - "DAILY"

    # Scratch/workspace for ad hoc work
    scratch:
      +materialized: view
      +schema: scratch
      +tags:
        - "SCRATCH"
        - "AD_HOC"

  dbt_project_evaluator:
    # Disabled by default so a normal `dbt build` skips the evaluator.
    # Enable it explicitly with `--vars '{project_evaluator_enabled: true}'`
    # (see the `run-dbt-project-evaluator` Makefile target).
    +enabled: "{{ var('project_evaluator_enabled', false) }}"
    +schema: quality
    marts:
      dag:
        fct_model_fanout:
          +enabled: false
        fct_staging_dependent_on_marts_or_intermediate:
          +enabled: false

seeds:
  nba_elt_project:
    +schema: bronze

# dont let project evaluator fuck your shit up
data_tests:
  dbt_project_evaluator:
    +severity: warn
