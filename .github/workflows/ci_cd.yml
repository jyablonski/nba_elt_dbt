name: CI / CD Pipeline

on:
  pull_request:
  push:
    branches:
      - master

env:
  UV_VERSION: "0.11.15"
  PYTHON_VERSION: "3.13"
  IAM_ROLE: ${{ secrets.IAM_ROLE_ECR }}
  AWS_REGION: "us-east-1"
  DBT_HOST: ${{ secrets.DBT_HOST }}
  DBT_DBNAME: ${{ secrets.DBT_DBNAME }}
  DBT_SCHEMA: ${{ secrets.DBT_SCHEMA }}
  DBT_USER: ${{ secrets.DBT_USER }}
  DBT_DOCS_BUCKET: ${{ secrets.DBT_DOCS_BUCKET }}
  DBT_PASS: ${{ secrets.DBT_PASS }}
  S3_BUCKET: ${{ secrets.S3_BUCKET }}

permissions:
  id-token: write
  contents: read # This is required for actions/checkout

jobs:
  ci_pipeline:
    name: CI Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the Repo
        uses: actions/checkout@v5

      - name: Configure Aws Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ env.IAM_ROLE }}
          role-session-name: nba-elt-dbt-ci
          aws-region: ${{ env.AWS_REGION }}

      - name: Get Manifest File
        run: |
          aws s3 cp s3://${{ env.S3_BUCKET }}/ci/manifest.json target/manifest.json

      # NOTE: this builds the entire project and doesnt actually use the manifest json
      # bc it builds fast as fuck anyways boi
      - name: Build dbt Models
        run: |
          make test

      - name: Upload Manifest to S3
        run: |
          if [ -e "target/manifest.json" ]; then
              aws s3 cp target/manifest.json s3://${{ env.S3_BUCKET }}/ci/manifest.json
          else
              echo "File does not exist, no dbt Models were changed. Exiting Out"
              exit 0
          fi

  dbt_prod_deploy:
    name: dbt Prod Deploy
    needs: [ci_pipeline]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' && success()
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: read

    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ env.IAM_ROLE }}
          role-session-name: nba-elt-dbt-cd-dbt
          aws-region: ${{ env.AWS_REGION }}

      - name: Detect SKIP_SLIM_CI on merged PR
        id: deploy_mode
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          PR_NUMBER=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" --jq '.[0].number // empty')
          if [ -z "$PR_NUMBER" ]; then
            echo "skip_slim_ci=false" >> "$GITHUB_OUTPUT"
            echo "No associated PR for this push; running slim CI."
            exit 0
          fi
          if gh pr view "$PR_NUMBER" --json labels --jq '.labels[].name' | grep -qx 'SKIP_SLIM_CI'; then
            echo "skip_slim_ci=true" >> "$GITHUB_OUTPUT"
            echo "PR #${PR_NUMBER} has SKIP_SLIM_CI; manifest-only deploy."
          else
            echo "skip_slim_ci=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --frozen --no-dev

      - name: Fetch previous prod manifest for state comparison
        run: |
          mkdir -p prod-artifacts
          aws s3 cp "s3://${{ env.S3_BUCKET }}/prod/manifest.json" prod-artifacts/manifest.json

      - name: dbt deps
        run: dbt deps --profiles-dir profiles/ --target prod

      - name: dbt parse (manifest-only deploy)
        if: steps.deploy_mode.outputs.skip_slim_ci == 'true'
        run: dbt parse --profiles-dir profiles/ --target prod

      - name: dbt build (slim CI)
        if: steps.deploy_mode.outputs.skip_slim_ci != 'true'
        run: |
          dbt build \
            --profiles-dir profiles/ \
            --target prod \
            --select state:modified+ \
            --state prod-artifacts \
            --fail-fast

      - name: Publish prod manifest to S3
        run: |
          if [ ! -f target/manifest.json ]; then
            echo "target/manifest.json missing; cannot publish prod manifest."
            exit 1
          fi
          aws s3 cp target/manifest.json \
            "s3://${{ env.S3_BUCKET }}/prod/manifest.json" \
            --cache-control "no-cache"
          aws s3 cp target/manifest.json \
            "s3://${{ env.S3_BUCKET }}/prod/history/${GITHUB_SHA}/manifest.json"
          if [ -f target/run_results.json ]; then
            aws s3 cp target/run_results.json \
              "s3://${{ env.S3_BUCKET }}/prod/history/${GITHUB_SHA}/run_results.json"
          fi

      - name: Generate dbt docs
        run: dbt docs generate --profiles-dir profiles/ --target prod

      - name: Upload dbt target artifact
        uses: actions/upload-artifact@v4
        with:
          name: dbt-target-${{ github.sha }}
          path: target/
          retention-days: 14

  publish_docs:
    name: Publish dbt Docs
    needs: [dbt_prod_deploy]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' && needs.dbt_prod_deploy.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ env.IAM_ROLE }}
          role-session-name: nba-elt-dbt-cd-docs
          aws-region: ${{ env.AWS_REGION }}

      - name: Download dbt target artifact
        uses: actions/download-artifact@v4
        with:
          name: dbt-target-${{ github.sha }}
          path: target/

      - name: Deploy dbt docs to S3
        env:
          aws_bucket: ${{ secrets.DBT_DOCS_BUCKET }}
        run: |
          aws s3 cp target/ "s3://${aws_bucket}/" --recursive \
            --exclude "*" \
            --include "catalog.json" \
            --include "run_results.json" \
            --include "index.html" \
            --include "manifest.json"

  publish_image:
    name: Build and Push Docker Image
    needs: [ci_pipeline]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' && success()
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Build and Push Docker Image to ECR
        uses: jyablonski/actions/deploy@v1
        with:
          role-to-assume: ${{ env.IAM_ROLE }}
          aws-region: ${{ env.AWS_REGION }}
          ecr-repo: jacobs_repo
          image-name: nba_elt_pipeline_dbt
          dockerfile: docker/Dockerfile
          context: .

  notify:
    name: Deploy Notification
    needs: [dbt_prod_deploy, publish_docs, publish_image]
    if: >-
      always() && !cancelled()
      && github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Slack Alert
        uses: jyablonski/actions/alert@v1
        with:
          status: ${{ contains(needs.*.result, 'failure') && 'failure' || 'success' }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
